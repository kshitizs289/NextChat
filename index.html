<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NexChat — Sign In</title>
  <meta name="description" content="Sign in to NexChat — a premium real-time chat platform" />
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body class="auth-page">

  <!-- Animated background orbs -->
  <div class="auth-orb orb-1"></div>
  <div class="auth-orb orb-2"></div>
  <div class="auth-orb orb-3"></div>

  <!-- Auth card -->
  <div class="auth-card">

    <!-- Logo -->
    <div class="auth-logo">
      <div class="auth-logo-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
      </div>
      <span class="auth-logo-text">NexChat</span>
    </div>

    <!-- Tabs -->
    <div class="auth-tabs" role="tablist">
      <button class="auth-tab active" id="tab-login" role="tab" aria-selected="true" aria-controls="form-login" onclick="switchTab('login')">Sign In</button>
      <button class="auth-tab" id="tab-register" role="tab" aria-selected="false" aria-controls="form-register" onclick="switchTab('register')">Create Account</button>
    </div>

    <!-- Login Form -->
    <form class="auth-form active" id="form-login" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label" for="login-email">Email</label>
        <div class="form-input-wrap">
          <svg class="input-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
          <input class="input" id="login-email" type="email" placeholder="you@example.com" autocomplete="email" required />
        </div>
        <span class="input-error" id="login-email-err"></span>
      </div>

      <div class="form-group">
        <label class="form-label" for="login-password">Password</label>
        <div class="form-input-wrap">
          <svg class="input-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input class="input" id="login-password" type="password" placeholder="••••••••" autocomplete="current-password" required />
          <button type="button" class="toggle-password" onclick="togglePwd('login-password', this)" tabindex="-1">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <span class="input-error" id="login-pwd-err"></span>
      </div>

      <button class="btn btn-primary auth-submit" id="login-btn" type="submit">
        <span class="btn-text">Sign In</span>
        <div class="btn-spinner spinner"></div>
      </button>
    </form>

    <!-- Register Form -->
    <form class="auth-form" id="form-register" onsubmit="handleRegister(event)">
      <div class="form-group">
        <label class="form-label" for="reg-name">Display Name</label>
        <div class="form-input-wrap">
          <svg class="input-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="5"/><path d="M20 21a8 8 0 1 0-16 0"/></svg>
          <input class="input" id="reg-name" type="text" placeholder="Your name" autocomplete="name" minlength="2" maxlength="32" required />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="reg-email">Email</label>
        <div class="form-input-wrap">
          <svg class="input-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
          <input class="input" id="reg-email" type="email" placeholder="you@example.com" autocomplete="email" required />
        </div>
        <span class="input-error" id="reg-email-err"></span>
      </div>

      <div class="form-group">
        <label class="form-label" for="reg-password">Password</label>
        <div class="form-input-wrap">
          <svg class="input-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input class="input" id="reg-password" type="password" placeholder="At least 6 characters" autocomplete="new-password" minlength="6" oninput="checkStrength(this.value)" required />
          <button type="button" class="toggle-password" onclick="togglePwd('reg-password', this)" tabindex="-1">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div class="password-strength" id="pwd-strength">
          <div class="strength-bar" id="s1"></div>
          <div class="strength-bar" id="s2"></div>
          <div class="strength-bar" id="s3"></div>
          <div class="strength-bar" id="s4"></div>
        </div>
        <span class="input-error" id="reg-pwd-err"></span>
      </div>

      <button class="btn btn-primary auth-submit" id="register-btn" type="submit">
        <span class="btn-text">Create Account</span>
        <div class="btn-spinner spinner"></div>
      </button>
    </form>

    <p class="auth-footer">By continuing you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a></p>
  </div>

  <!-- Toast container -->
  <div id="toast-container"></div>

  <!-- Supabase SDK (no install needed — loads from CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <!-- App config (user fills this in) -->
  <script src="supabase-config.js"></script>

  <!-- Auth logic -->
  <script src="js/supabase-init.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
